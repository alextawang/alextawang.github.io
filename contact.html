<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACOM | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --surface-1: #0F172A;
            --surface-2: #1E293B;
            --primary-glow: #60A5FA;
            --accent-telecom: #FB7185;
            --text-prose: #F8FAFC;
            --text-dim: #94A3B8;
            --glass: 1px solid rgba(255,255,255,0.08);
            --shadow-glow: 0 0 15px rgba(96,165,250,0.2);
            --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
            --font-primary: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; }
        body { margin:0; background:var(--bg-base); color:var(--text-prose); font-family:var(--font-primary); }
        h1, h2 { font-family:var(--font-mono); }
        .container { max-width:1200px; margin:0 auto; padding:0 24px; }
        header { padding:20px 0; border-bottom:var(--glass); backdrop-filter:blur(12px); position:sticky; top:0; z-index:100; }
        nav a { color:var(--text-prose); text-decoration:none; margin-left:20px; }
        .menu-button { display:none; background:none; border:none; font-size:24px; color:var(--text-prose); }
        .mobile-nav { position:fixed; top:0; right:-100%; width:90%; height:100%; background:var(--surface-1); backdrop-filter:blur(12px); transition:right .3s ease; padding:40px 20px; display:flex; flex-direction:column; }
        .mobile-nav.open { right:0; }
        .mobile-nav a { margin:12px 0; }
        @media (max-width: 768px) {
            .menu-button { display: block; }
            .desktop-nav { display: none; }
        }
        form { background:var(--surface-1); padding:24px; border-radius:12px; margin-top:40px; }
        label { display:block; margin:12px 0 4px; }
        input, select, textarea { width:100%; padding:8px; border:var(--glass); border-radius:6px; background:var(--surface-2); color:var(--text-prose); }
        button { background:var(--primary-glow); color:var(--bg-base); padding:12px 24px; border:none; border-radius:6px; cursor:pointer; }
        footer { background: var(--surface-1); padding: 24px 0; text-align: center; font-size:0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-weight:700; font-size:24px;">TACOM</div>
            <button class="menu-button" id="menuBtnContact">☰</button>
            <nav class="desktop-nav">
                <a href="index.html">Home</a>
                <a href="solutions.html">Solutions</a>
                <a href="cases.html">Cases</a>
                <a href="news.html">News</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
        <nav class="mobile-nav" id="mobileNavContact">
            <a href="index.html">Home</a>
            <a href="solutions.html">Solutions</a>
            <a href="cases.html">Cases</a>
            <a href="news.html">News</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h1>Contact</h1>
        <form action="mailto:alexwang@shtacom.com" method="POST" enctype="text/plain">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="category">Technical Triage</label>
            <select id="category" name="category">
                <option value="integration">System Integration</option>
                <option value="telecom">Telecom Engineering</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5"></textarea>

            <button type="submit">Send</button>
        </form>
    </div>

    <script>
        document.getElementById('menuBtnContact').addEventListener('click', function(){
            document.getElementById('mobileNavContact').classList.toggle('open');
        });
    </script>
    <footer>
        <div class="container">
            &copy; 2026 TACOM. All rights reserved.
        </div>
    </footer>
</body>
</html>
